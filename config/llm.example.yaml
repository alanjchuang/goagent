# goagent LLM 配置示例（对应 AgentLoom config/llm.example.yaml）
#
# 使用方法：复制为 config/llm.yaml 并填入真实的 base_url / api_key / model。
# base_url 需为 OpenAI 兼容的 Chat Completions 端点（结尾不含 /chat/completions）。
# model 支持 litellm 风格前缀（如 openai/gpt-4o），程序会自动去掉前缀。

model:
  # 默认模型类型：agent yaml 未指定 model_type 时使用
  default_model_type: powerful

  # 强大模型（复杂推理 / 代码任务）
  powerful:
    base_url: "https://api.openai.com/v1"
    api_key: "sk-xxxxxxxx"
    model: "openai/gpt-4o"
    temperature: 0.2
    max_tokens: 8000
    timeout: 300
    num_retries: 3

  # 快速模型（简单任务）
  fast:
    base_url: "https://api.openai.com/v1"
    api_key: "sk-xxxxxxxx"
    model: "openai/gpt-4o-mini"
    temperature: 0.3
    max_tokens: 4000
    timeout: 120
    num_retries: 3

  # 图片生成模型（供 ark_generate_images 使用）
  # 也可用环境变量覆盖：ARK_IMAGE_API_KEY / ARK_IMAGE_MODEL / ARK_IMAGE_MODEL_TYPE
  # 图片 endpoint/model 请在配置中填写。
  image:
    base_url: "https://ark.cn-beijing.volces.com/api/v3"
    api_key: "ark-image-api-key"
    model: "ark-image-endpoint-id"
    timeout: 600

  # 独立联网搜索 API（供 volc_web_search 使用，不走 ARK 内置 web_search）
  # 也可用环境变量覆盖：VOLC_SEARCH_API_KEY / SEARCH_API_KEY / VOLC_SEARCH_API_URL
  search:
    base_url: "https://open.feedcoopapi.com/search_api/web_search"
    api_key: "search-api-key"
    model: "volc-search"
    timeout: 30

  # 微信公众号草稿 API（供 wechat_create_draft 使用）
  # 也可用环境变量覆盖：WECHAT_MP_ACCESS_TOKEN 或 WECHAT_MP_APP_ID / WECHAT_MP_APP_SECRET
  # 说明：这里复用 model 字段保存 app_id，api_key 字段保存 app_secret。
  wechat_official_account:
    base_url: "https://api.weixin.qq.com"
    api_key: "wechat-app-secret"
    model: "wechat-app-id"
    timeout: 60
